<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>orc-time</title>
  <style>
    :root {
      --bg-color:    #1a1a1a;
      --text-color:  #eeeeee;
      --header-text: #bbbbbb;
      --dim-color:   #888888;
      --border-color:#444444;
    }

    body { background-color: #111; padding: 20px; }

    .o-time-wrapper {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'JetBrains Mono', monospace;
      padding: 25px;
      border-radius: 4px;
      max-width: 650px;
      margin-bottom: 20px;
      border: 1px solid #222;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: var(--dim-color);
      font-size: 0.9rem;
      text-transform: lowercase;
      letter-spacing: 1px;
    }

    .o-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .o-table th,
    .o-table td {
      text-align: left;
      padding: 12px 2px;
      border-bottom: 1px solid var(--border-color);
    }

    .o-table th:first-child,
    .o-table td:first-child {
      width: 160px;
      padding-right: 80px;
      white-space: nowrap;
    }

    .o-table th {
      color: var(--header-text);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: lowercase;
    }

    .o-row td {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--text-color);
    }

    .controls { margin-top: 10px; }

    #copy-btn {
      background: transparent;
      color: var(--dim-color);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    #copy-btn:hover {
      border-color: #666;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="o-time-wrapper">
  <h3>orc-time (time-zone projection)</h3>
  <table class="o-table">
    <thead>
      <tr>
        <th>date</th>
        <th>orc(2h|8m)</th>
        <th>min(0.5m)</th>
        <th>tic(1.8s)</th>
      </tr>
    </thead>
    <tbody>
      <tr id="orc-time-row" class="o-row"><td colspan="4">...</td></tr>
    </tbody>
  </table>

  <div class="controls">
    <button id="copy-btn" onclick="copyMarkdown()">copy as markdown</button>
  </div>
</div>

<script>
(function () {
  const SI_PER_SEC  = 9192631770n;
  const O_TIC       = 17179869184n;
  const GLYPHS      = "0123456789ABCDEF";

  function toHex(n) { return GLYPHS[Number(n) & 0xF]; }

  function getState() {
    const now      = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const diffMs   = BigInt(now - midnight);
    const tics     = (diffMs * SI_PER_SEC) / (1000n * O_TIC);

    const tic_orc = toHex(tics & 0xFn);
    const min_orc = toHex((tics >> 4n) & 0xFn);
    const arc_orc = toHex((tics >> 8n) & 0xFn);
    const ora_orc = toHex((tics >> 12n) & 0xFn);
    const orc_id  = `${ora_orc}${arc_orc}`;

    const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

    return { orc_id, min_orc, tic_orc, dateStr };
  }

  function render() {
    const s = getState();
    document.getElementById("orc-time-row").innerHTML =
      `<td>${s.dateStr}</td><td>${s.orc_id}</td><td>${s.min_orc}</td><td>${s.tic_orc}</td>`;
  }

  window.copyMarkdown = function () {
    const s   = getState();
    const pad = (v, n) => v.toString().padEnd(n, ' ');

    const md =
      "  **orc-time (time-zone projection)**\n" +
      "  | date          | orc(2h|8m) | min(0.5m) | tic(1.8s) |\n" +
      "  |---------------|------------|-----------|-----------|\n" +
      "  | " + pad(s.dateStr, 13) + " | " + pad(s.orc_id, 10) + " | " + pad(s.min_orc, 9) + " | " + pad(s.tic_orc, 9) + " |";

    navigator.clipboard.writeText(md).then(() => {
      const btn = document.getElementById("copy-btn");
      const orig = btn.innerText;
      btn.innerText = "copied";
      setTimeout(() => btn.innerText = orig, 1200);
    });
  };

  setInterval(render, 150);
  render();
})();
</script>
</body>
</html>
