<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>o-time & orc-time (Sovereign 0-f)</title>
  <style>
    :root {
      --bg-color: #1a1a1a;
      --text-color: #eeeeee;
      --header-text: #bbbbbb;
      --dim-color: #888888;
      --border-color: #444444;
    }

    body { background-color: #111; padding: 20px; }

    .o-time-wrapper {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'JetBrains Mono', monospace;
      padding: 25px;
      border-radius: 4px;
      max-width: 650px;
      margin-bottom: 20px;
      border: 1px solid #222;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: var(--dim-color);
      font-size: 0.9rem;
      text-transform: lowercase;
      letter-spacing: 1px;
    }

    .o-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    .o-table th, 
    .o-table td {
      text-align: left;
      padding: 12px 2px;
      border-bottom: 1px solid var(--border-color);
    }

    .o-table th:first-child,
    .o-table td:first-child {
      width: 160px;
      padding-right: 80px; 
      white-space: nowrap;
    }

    .o-table th {
      color: var(--header-text);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: lowercase;
    }

    .o-row td {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--text-color);
    }

    #copy-btn {
      background: transparent;
      color: var(--dim-color);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #copy-btn:hover {
      border-color: #666;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="o-time-wrapper">
  <h3>o-time epoch (sovereign)</h3>
  <table class="o-table">
    <thead>
      <tr><th>cyc</th><th>mon</th><th>day</th><th>ora</th><th>arc</th><th>min</th><th>tic</th></tr>
    </thead>
    <tbody>
      <tr id="o-time-row" class="o-row"><td colspan="7">...</td></tr>
    </tbody>
  </table>

  <h3>orc-time (time-zone projection)</h3>
  <table class="o-table">
    <thead>
      <tr>
        <th>date</th>
        <th>orc(2h8m)</th>
        <th>min(0.5m)</th>
        <th>tic(1.8s)</th>
      </tr>
    </thead>
    <tbody>
      <tr id="orc-time-row" class="o-row"><td colspan="4">...</td></tr>
    </tbody>
  </table>

  <div class="controls">
    <button id="copy-btn" onclick="copyAllMarkdown()">copy manifest as markdown</button>
  </div>
</div>

<script>
(function () {
  const SI_TRANSITIONS_PER_SEC = 9192631770n;
  const O_SEC_TRANSITIONS = 17179869184n; 

  // THE GLYPH MAP: O(1) efficiency. No logic, just pointers.
  const glyphs = "0123456789abcdef";

  function toSovereign(n) {
    return glyphs[Number(n) & 0xF];
  }

  function computeOTime() {
    return ((BigInt(Date.now()) * SI_TRANSITIONS_PER_SEC) / 1000n) / O_SEC_TRANSITIONS;
  }

  function computeOrcTime() {
    const now = new Date();
    const reset = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
    const diffMs = BigInt(now - reset);
    return ((diffMs * SI_TRANSITIONS_PER_SEC) / 1000n) / O_SEC_TRANSITIONS;
  }

  function render() {
    const oVal = computeOTime();
    const orcVal = computeOrcTime();
    const dateStr = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

    // Extract O-Time components
    let rO = oVal;
    const tic_o = toSovereign(rO); rO >>= 4n;
    const min_o = toSovereign(rO); rO >>= 4n;
    const arc_o = toSovereign(rO); rO >>= 4n;
    const ora_o = toSovereign(rO); rO >>= 4n;
    const day_o = toSovereign(rO); rO >>= 4n;
    const mon_o = toSovereign(rO); rO >>= 4n;
    const cyc_o = rO.toString(16).toLowerCase();

    // Extract Orc-Time components
    let rOrc = orcVal;
    const tic_orc = toSovereign(rOrc); rOrc >>= 4n;
    const min_orc = toSovereign(rOrc); rOrc >>= 4n;
    const arc_orc = toSovereign(rOrc); rOrc >>= 4n;
    const ora_orc = toSovereign(rOrc);
    const orc_id = `${ora_orc}${arc_orc}`;

    document.getElementById("o-time-row").innerHTML = 
      `<td>${cyc_o}</td><td>${mon_o}</td><td>${day_o}</td><td>${ora_o}</td><td>${arc_o}</td><td>${min_o}</td><td>${tic_o}</td>`;
    
    document.getElementById("orc-time-row").innerHTML = 
      `<td>${dateStr}</td><td>${orc_id}</td><td>${min_orc}</td><td>${tic_orc}</td>`;
  }

  window.copyAllMarkdown = function() {
    const oText = document.getElementById("o-time-row").innerText.split('\t').join(' | ');
    const orcCells = document.getElementById("orc-time-row").getElementsByTagName("td");
    const dateStr = orcCells[0].innerText;
    const orc_id = orcCells[1].innerText;
    const min_orc = orcCells[2].innerText;
    const tic_orc = orcCells[3].innerText;

    const md = `### Temporal Manifest\n\n**o-time epoch (sovereign)**\n| cyc | mon | day | ora | arc | min | tic |\n|---|---|---|---|---|---|---|\n| ${oText.replace(/\n/g, ' | ')} |\n\n**orc-time (projection)**\n| date | orc | min | tic |\n|---|---|---|---|\n| ${dateStr} | ${orc_id} | ${min_orc} | ${tic_orc} |`;

    navigator.clipboard.writeText(md).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.innerText = "manifest copied";
        setTimeout(() => btn.innerText = "copy manifest as markdown", 1200);
    });
  }

  setInterval(render, 150);
  render();
})();
</script>
</body>
</html>
