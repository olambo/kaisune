<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>orc-grid</title>
  <style>
    :root {
      --bg:      #111111;
      --surface: #1a1a1a;
      --border:  #333333;
      --dim:     #555555;
      --mid:     #888888;
      --text:    #eeeeee;
      --accent:  #c8a96e;
      --invalid: #161616;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      padding: 24px;
    }

    header { margin-bottom: 20px; }

    header h2 {
      font-size: 0.85rem;
      color: var(--mid);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: lowercase;
      margin-bottom: 6px;
    }

    #live-display {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--text);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    #live-display .orc-val { color: var(--accent); }

    .grid-wrapper {
      overflow-x: auto !important;
      width: 100% !important;
      display: block !important;
      text-align: left !important;
    }

    #grid {
      border-collapse: collapse !important;
      margin-top: 8px !important;
      table-layout: fixed !important;
      width: 668px !important;
      min-width: 668px !important;
      max-width: 668px !important;
      margin-left: 0 !important;
      display: table !important;
    }

    th {
      color: var(--dim);
      font-size: 0.7rem;
      font-weight: 400;
      padding: 4px 6px;
      text-align: center;
      width: 38px !important;
    }

    .row-label {
      width: 60px !important;
      min-width: 60px !important;
      max-width: 60px !important;
      color: var(--mid);
      font-size: 0.65rem;
      padding: 6px 12px 6px 0 !important;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
    }

    .row-label .ora-id {
      color: var(--text);
      font-size: 0.85rem;
      display: block;
    }

    .row-label .clock {
      color: var(--dim);
      font-size: 0.6rem;
      display: block;
      margin-top: 1px;
    }

    td.cell {
      width: 38px !important;
      min-width: 38px !important;
      max-width: 38px !important;
      height: 38px !important;
      text-align: center;
      vertical-align: middle;
      font-size: 0.8rem;
      border: 1px solid var(--border) !important;
      cursor: default;
      background: var(--surface);
      color: var(--mid);
      padding: 0 !important;
      font-variant-numeric: tabular-nums;
      line-height: 38px !important;
    }

    td.cell.invalid {
      background: var(--invalid) !important;
      color: #252525 !important;
      border-color: #1e1e1e !important;
    }

    td.cell.partial {
      background: var(--surface);
      color: var(--border);
      border-color: var(--border);
    }

    td.cell.active {
      background: var(--accent) !important;
      color: #111 !important;
      font-weight: bold;
      border-color: var(--accent) !important;
    }

    td.cell.past   { color: #3a3a3a !important; }
    td.cell.future { color: var(--dim) !important; }

    td.cell.quarter-marker { border-color: #5a2a6a !important; background: #2a1a3a !important; }
    td.cell.third-marker   { border-color: #7a4a10 !important; background: #3a2008 !important; }

    td.cell.quarter-marker.active,
    td.cell.third-marker.active { background: var(--accent) !important; border-color: var(--accent) !important; color: #111 !important; }

    td.cell:not(.invalid):hover { border-color: #666 !important; color: var(--text) !important; }

    .progress-bar {
      margin-top: 20px;
      height: 3px;
      background: var(--border);
      width: 668px !important;
      max-width: 668px !important;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s linear;
    }

    #hover-status {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--mid);
      min-height: 1.2em;
    }

    #footer-note {
      margin-top: 10px;
      font-size: 0.65rem;
      color: var(--dim);
    }
  </style>
</head>
<body>

<header>
  <h2>orc-time — daily grid</h2>
  <div id="live-display">
    orc <span class="orc-val" id="orc-now">--</span>
    <span style="font-size:0.85rem;color:var(--mid);margin-left:16px" id="mit-now"></span>
  </div>
</header>

<div class="grid-wrapper">
  <table id="grid"></table>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div id="hover-status"></div>
<div id="footer-note"></div>

<script>
(function () {
  const SI_PER_SEC  = 9192631770n;
  const O_TIC       = 17179869184n;
  const GLYPHS      = "0123456789ABCDEF";
  const ARC_MS      = 256 * Number(O_TIC) / Number(SI_PER_SEC) * 1000;
  const ORA_MS      = 16 * ARC_MS;
  const PARTIAL_ORC = 180;

  function getOrcState() {
    const now      = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const diffMs   = BigInt(now - midnight);
    const tics     = (diffMs * SI_PER_SEC) / (1000n * O_TIC);
    const ora      = Number((tics >> 12n) & 0xFn);
    const arc      = Number((tics >> 8n) & 0xFn);
    const min      = Number((tics >> 4n) & 0xFn);
    const tic      = Number(tics & 0xFn);
    return {
      orcIndex: ora * 16 + arc,
      orcStr:   GLYPHS[ora] + GLYPHS[arc],
      mitStr:   GLYPHS[min] + GLYPHS[tic],
      now
    };
  }

  function fmt12(sec) {
    const h24  = Math.floor(sec / 3600);
    const m    = Math.floor((sec % 3600) / 60);
    const ampm = h24 >= 12 ? 'pm' : 'am';
    const h12  = h24 % 12 || 12;
    return h12 + ':' + (m < 10 ? '0' : '') + m + ampm;
  }

  function buildGrid() {
    const tbl = document.getElementById('grid');
    let html = '<thead><tr><th style="width:60px"></th>';
    for (let a = 0; a < 16; a++) {
      html += `<th style="width:38px">${GLYPHS[a]}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (let o = 0; o <= 11; o++) {
      const clockLbl = fmt12(Math.floor(o * ORA_MS / 1000));
      html += `<tr><td class="row-label"><span class="ora-id">${GLYPHS[o]}</span><span class="clock">${clockLbl}</span></td>`;

      for (let a = 0; a < 16; a++) {
        const idx = o * 16 + a;
        let cls = 'cell';
        let txt = GLYPHS[o] + GLYPHS[a];

        if (idx > PARTIAL_ORC) {
          cls += ' invalid'; txt = '··';
        } else if (idx === PARTIAL_ORC) {
          cls += ' partial';
        } else {
          if ([45, 90, 135].includes(idx)) cls += ' quarter-marker';
          else if ([60, 120].includes(idx)) cls += ' third-marker';
        }
        html += `<td class="${cls}" data-orc="${idx}" style="width:38px!important;height:38px!important">${txt}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody>';
    tbl.innerHTML = html;

    // Hover
    tbl.addEventListener('mouseover', e => {
      const td = e.target.closest('td.cell');
      if (!td || td.classList.contains('invalid')) {
        document.getElementById('hover-status').innerHTML = '';
        return;
      }
      const idx = parseInt(td.dataset.orc);
      const o   = Math.floor(idx / 16);
      const a   = idx % 16;
      document.getElementById('hover-status').innerHTML =
        `orc <span style="color:#c8a96e">${GLYPHS[o]+GLYPHS[a]}</span>  →  ${fmt12(Math.floor(idx*ARC_MS/1000))} – ${fmt12(Math.floor((idx+1)*ARC_MS/1000))}`;
    });

    tbl.addEventListener('mouseleave', () => {
      document.getElementById('hover-status').innerHTML = '';
    });

    // Footer
    const b4s = Math.floor(PARTIAL_ORC * ARC_MS / 1000);
    document.getElementById('footer-note').textContent =
      `00–B3: 180 full orcs  ·  B4 partial: ${Math.floor(b4s/3600)}:${String(Math.floor((b4s%3600)/60)).padStart(2,'0')}:${String(b4s%60).padStart(2,'0')} → midnight  ·  B5–BF: never active`;
  }

  function update() {
    const s = getOrcState();
    document.getElementById('orc-now').textContent = s.orcStr;
    document.getElementById('mit-now').textContent =
      `mit ${s.mitStr}  ·  ${s.now.toLocaleTimeString('en-GB', {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true})}`;

    document.querySelectorAll('td.cell').forEach(td => {
      const idx = parseInt(td.dataset.orc);
      td.classList.remove('active', 'past', 'future');
      if (td.classList.contains('invalid')) return;
      if (idx === s.orcIndex)    td.classList.add('active');
      else if (idx < s.orcIndex) td.classList.add('past');
      else                       td.classList.add('future');
    });

    const elapsed = s.now - new Date(s.now.getFullYear(), s.now.getMonth(), s.now.getDate());
    document.getElementById('progress').style.width = (elapsed / 86400000 * 100).toFixed(4) + '%';
  }

  buildGrid();
  update();
  setInterval(update, 500);
})();
</script>
</body>
</html>
