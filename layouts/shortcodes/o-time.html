<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>o-time Interface</title>
        <style>
            :root {
                --bg-color: #1a1a1a;
                --text-color: #eeeeee;
                --header-text: #bbbbbb;
                --dim-color: #888888;
                --border-color: #444444;
            }

            body { background-color: #111; padding: 20px; }

            .o-time-wrapper {
                background-color: var(--bg-color);
                color: var(--text-color);
                font-family: "JetBrains Mono", monospace;
                padding: 25px;
                border-radius: 4px;
                max-width: 700px;
                border: 1px solid #222;
            }

            h3 {
                margin-top: 0;
                margin-bottom: 15px;
                color: var(--dim-color);
                font-size: 0.9rem;
                text-transform: lowercase;
                letter-spacing: 1px;
            }

            #o-time-table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                margin-bottom: 20px;
            }

            #o-time-table th,
            #o-time-table td {
                text-align: left;
                padding: 12px 2px;
                border-bottom: 1px solid var(--border-color);
            }

            #o-time-table th {
                color: var(--header-text);
                font-weight: 600;
                font-size: 0.85rem;
                text-transform: lowercase;
            }

            #o-time-row td {
                font-size: 1.3rem;
                font-weight: bold;
                color: var(--text-color);
            }

            .controls { margin-top: 10px; }

            #copy-btn {
                background: transparent;
                color: var(--dim-color);
                border: 1px solid var(--border-color);
                padding: 8px 16px;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75rem;
                cursor: pointer;
                transition: all 0.2s;
            }
            
            #copy-btn:hover {
                border-color: #666;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="o-time-wrapper">
            <h3>o-time epoch (hex)</h3>

            <table id="o-time-table">
                <thead>
                    <tr>
                        <th>dec</th>
                        <th>cyc</th>
                        <th>mth</th>
                        <th>day</th>
                        <th>ora</th>
                        <th>arc</th>
                        <th>min</th>
                        <th>tic</th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="o-time-row">
                        <td colspan="8">...</td>
                    </tr>
                </tbody>
            </table>

            <div class="controls">
                <button id="copy-btn" onclick="copyOTimeMarkdown()">
                    copy as markdown
                </button>
            </div>
        </div>

        <script>
            (function () {
                const SI_TRANSITIONS_PER_SEC = 9192631770n;
                const O_SEC_TRANSITIONS = 17179869184n;
                
                // UPPERCASE GLYPHS: Efficient mapping for the "industrial" look
                const glyphs = "0123456789ABCDEF";

                function toHex(n) {
                    return glyphs[Number(n) & 0xF];
                }

                function computeOTime() {
                    const nowMs = BigInt(Date.now());
                    const totalTransitions = (nowMs * SI_TRANSITIONS_PER_SEC) / 1000n;
                    let r = totalTransitions / O_SEC_TRANSITIONS;

                    const o_tic = toHex(r); r >>= 4n;
                    const o_min = toHex(r); r >>= 4n;
                    const o_arc = toHex(r); r >>= 4n;
                    const o_ora = toHex(r); r >>= 4n;
                    const o_day = toHex(r); r >>= 4n;
                    const o_mth = toHex(r); r >>= 4n;
                    const o_cyc = toHex(r); r >>= 4n;
                    const o_dec = toHex(r); 

                    return [o_dec, o_cyc, o_mth, o_day, o_ora, o_arc, o_min, o_tic];
                }

                function render() {
                    const values = computeOTime();
                    const row = document.getElementById("o-time-row");
                    if (row) {
                        row.innerHTML = values
                            .map((v) => `<td>${v}</td>`)
                            .join("");
                    }
                }

                window.copyOTimeMarkdown = function () {
                    const values = computeOTime();
                    const pad = (s, n) => s.toString().padEnd(n, ' ');

                    const md = "  ### Temporal Manifest\n\n" +
                               "  **o-time epoch (hex)**\n" +
                               "  | dec | cyc | mth | day | ora | arc | min | tic |\n" +
                               "  |-----|-----|-----|-----|-----|-----|-----|-----|\n" +
                               "  | " + values.map(v => pad(v, 3)).join(" | ") + " |";

                    navigator.clipboard.writeText(md).then(() => {
                        const btn = document.getElementById("copy-btn");
                        const oldText = btn.innerText;
                        btn.innerText = "copied to clipboard";
                        setTimeout(() => btn.innerText = oldText, 1200);
                    });
                };

                setInterval(render, 150);
                render();
            })();
        </script>
    </body>
</html>
